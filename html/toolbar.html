<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>CenterImages</title>
  <link rel="stylesheet" href="../css/toolbar.css">
  <script src="../js/l10n.js"></script>
  <script src="../js/toolbar.js"></script>
</head>
<body>
  <div id="header">
    <span id="title">CenterImages</span>
    <button id="hide"></button>
  </div>
  <div id="buttonbar">
    <button id="zoom"></button>
    <button id="equi"></button>
    <div id="bg">
      <div class="bg-row">
        <label for="bgsl" id="slbl"></label>
        <input id="bgsl" type="range" min="0" max="255" />
      </div>
      <div class="auto-row">
        <label for="auto" id="albl"></label>
        <input id="auto" type="checkbox" />
      </div>
    </div>
    <button id="help"></button>
  </div>
  <div id="copy">© 2026 lucdesign</div>
</body>
</html>
